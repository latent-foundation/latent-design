<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>latent. — site (print)</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    button { font-family: inherit; }

    /* Each captured screen becomes one print page */
    .sheet {
      padding: 0 40px 40px;
      max-width: 1080px;
      margin: 0 auto;
    }
    .sheet + .sheet { break-before: page; }

    @page { size: portrait; margin: 1.4cm; }

    @media print {
      html, body { background: var(--color-bg) !important; }
      /* force the warm graphite surfaces + borders to actually print */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      /* freeze any animation/transition at end-state, never revert to hidden */
      *, *::before, *::after {
        animation-delay: -99s !important; animation-duration: .001s !important;
        animation-iteration-count: 1 !important; animation-fill-mode: both !important;
        animation-play-state: running !important; transition-duration: 0s !important;
      }
      .sheet { padding-left: 8px; padding-right: 8px; }
      /* avoid splitting rows / cards across pages */
      article, .keep { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel">
    // Static page header (mark + wordmark), no nav interactivity for print.
    function PrintHeader() {
      return (
        <header style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "26px 0 20px", borderBottom: "1px solid var(--color-border-subtle)",
          marginBottom: 4,
        }}>
          <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <LogoMark size={24} theme="dark" />
            <Wordmark size={20} />
          </span>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--color-text-muted)" }}>
            latent.foundation
          </span>
        </header>
      );
    }

    function Sheet({ label, children }) {
      return (
        <div className="sheet">
          <PrintHeader />
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--color-text-muted)", padding: "22px 0 0" }}>{label}</div>
          {children}
          <SiteFooter />
        </div>
      );
    }

    function PrintApp() {
      // noop setters — print is static
      const noop = () => {};
      return (
        <React.Fragment>
          <Sheet label="01 · home"><Home setView={noop} /></Sheet>
          <Sheet label="02 · projects"><Projects /></Sheet>
          <Sheet label="03 · writing"><Writing setEssay={noop} /></Sheet>
          <Sheet label="04 · about"><About /></Sheet>
        </React.Fragment>
      );
    }

    document.documentElement.setAttribute("data-theme", "dark");
    ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp />);

    // Auto-print once fonts + render settle
    (async function () {
      try { await (document.fonts && document.fonts.ready); } catch (e) {}
      await new Promise(r => setTimeout(r, 700));
      window.print();
    })();
  </script>
</body>
</html>
