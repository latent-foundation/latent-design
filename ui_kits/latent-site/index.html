<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>latent. — site UI kit</title>
  <style>
    
    
  </style>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    .page { padding: 0 32px 0; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [view, setView] = useState("home");
      const [theme, setTheme] = useTheme();
      const [essay, setEssay] = useState(null);

      let body;
      if (essay) body = <Essay w={essay} back={() => setEssay(null)} />;
      else if (view === "home") body = <Home setView={setView} />;
      else if (view === "projects") body = <Projects />;
      else if (view === "writing") body = <Writing setEssay={setEssay} />;
      else if (view === "about") body = <About />;

      return (
        <div className="page">
          <SiteHeader view={view} setView={(v) => { setEssay(null); setView(v); }} theme={theme} setTheme={setTheme} />
          <main style={{ minHeight: "60vh" }}>{body}</main>
          <SiteFooter />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
